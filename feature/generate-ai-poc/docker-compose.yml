version: '3.8'
services:
  backend:
    build: ./feature/generate-ai-poc/backend
    ports:
      - "8000:8000"
    environment:
      - MODEL_SERVER_URL=${MODEL_SERVER_URL}
  frontend:
    image: node:18
    working_dir: /app
    volumes:
      - ./feature/generate-ai-poc/frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
